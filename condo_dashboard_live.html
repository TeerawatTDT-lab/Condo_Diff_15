<!-- เพิ่มบรรทัดนี้ใน <head> เพื่อเรียกใช้ PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    // URL ของ Google Sheets (ต้อง Publish เป็น CSV)
    const SHEET_ID = '1KIJ1dSGytf4piai2x_0MHAV2Ybf8kyu86bozjwSmbGg';
    const URL_DIFF = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Diff`;
    const URL_ALL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=AllCondoReg`;

    let rawDiffData = [];
    let allCondoData = [];

    // ฟังก์ชันดึงข้อมูลจาก Google Sheets
    async function loadDataFromSheets() {
        try {
            const [diffRes, allRes] = await Promise.all([
                fetch(URL_DIFF).then(res => res.text()),
                fetch(URL_ALL).then(res => res.text())
            ]);

            Papa.parse(diffRes, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: (results) => {
                    rawDiffData = results.data;
                    // ทำข้อมูลให้เป็น format ตัวเลขที่ถูกต้อง
                    rawDiffData.forEach(d => {
                        d.ALL_REG = Number(d.ALL_REG) || 0;
                        d.ALL_ROOM = Number(d.ALL_ROOM) || 0;
                        d.Percent_Diff = Number(d.Percent_Diff) || 0;
                    });
                    
                    Papa.parse(allRes, {
                        header: true, skipEmptyLines: true,
                        complete: (resAll) => {
                            allCondoData = resAll.data;
                            // เริ่มต้นการทำงานของ Dashboard
                            initMap(); 
                            populateFilters(); 
                            onFilterChange();
                        }
                    });
                }
            });
        } catch (error) {
            console.error("Error loading data:", error);
            alert("ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ โปรดตรวจสอบการเชื่อมต่อ");
        }
    }

    // แทนที่ window.onload เดิม
    window.onload = () => {
        loadDataFromSheets();
    };

    // ... (ส่วนฟังก์ชันอื่นๆ ของคุณคงเดิมไว้ได้เลย)
</script>
