<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condo Price Difference Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .map-wrapper { width: 100%; height: 480px; position: relative; }
        #map { width: 100%; height: 480px; border-radius: 0.75rem; z-index: 1; }
        .table-scroll { height: 480px; max-height: 480px; overflow-y: auto; }
        .full-table-scroll { max-height: 500px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .sort-icon { opacity: 0.3; transition: opacity 0.2s; }
        th:hover .sort-icon { opacity: 1; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-6">

    <header class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-indigo-600"></i> Dashboard วิเคราะห์ราคาห้องชุด
            </h1>
            <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3 flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2.5 rounded-lg"><i class="fa-regular fa-calendar-days text-lg"></i></div>
                <div>
                    <span class="text-xs font-semibold uppercase tracking-wider text-indigo-600 block">ช่วงเวลาข้อมูล</span>
                    <span class="text-sm font-bold text-slate-800">1 มิถุนายน 2568 ถึง 31 พฤษภาคม 2569</span>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label class="block text-xs font-medium text-slate-600 mb-1">จังหวัด</label><select id="filterProvince" onchange="onProvinceChange()" class="w-full bg-slate-50 border p-2.5 rounded-lg"><option value="">-- ทั้งหมด --</option></select></div>
            <div><label class="block text-xs font-medium text-slate-600 mb-1">สำนักงานที่ดิน</label><select id="filterBranch" onchange="onFilterChange()" class="w-full bg-slate-50 border p-2.5 rounded-lg"><option value="">-- ทั้งหมด --</option></select></div>
            <div><label class="block text-xs font-medium text-slate-600 mb-1">สถานะ</label><select id="filterStatus" onchange="onFilterChange()" class="w-full bg-slate-50 border p-2.5 rounded-lg"><option value="">-- ทั้งหมด --</option><option value="ร้อยละ 30 ขึ้นไป">ร้อยละ 30 ขึ้นไป</option><option value="น้อยกว่าร้อยละ 30">น้อยกว่าร้อยละ 30</option></select></div>
        </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-blue-500"><div class="text-sm text-slate-600 font-semibold">จำนวนอาคารชุด</div><div id="statTotalCondo" class="text-2xl font-bold mt-2">0</div></div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-indigo-500"><div class="text-sm text-slate-600 font-semibold">จำนวนการซื้อขาย</div><div id="statTotalReg" class="text-2xl font-bold text-indigo-600 mt-2">0</div></div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-amber-500"><div class="text-sm text-slate-600 font-semibold">จำนวนห้อง</div><div id="statTotalRoom" class="text-2xl font-bold text-amber-600 mt-2">0</div></div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-emerald-500"><div class="text-sm text-slate-600 font-semibold">อัตราการเปลี่ยนแปลงเฉลี่ย</div><div id="statAvgDiff" class="text-2xl font-bold text-emerald-600 mt-2">0%</div></div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4"><div id="map"></div></div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
            <div class="table-scroll"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th>อาคารชุด</th><th>สถานะ</th><th>% ต่าง</th></tr></thead><tbody id="top10TableBody"></tbody></table></div>
        </div>
    </section>

    <script>
        const SHEET_ID = '1KIJ1dSGytf4piai2x_0MHAV2Ybf8kyu86bozjwSmbGg';
        let rawDiffData = [];
        let allCondoData = [];
        let map, geoJsonLayer;

        async function loadData() {
            const [resDiff, resAll] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Diff`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=AllCondoReg`).then(r => r.text())
            ]);
            
            Papa.parse(resDiff, { header: true, dynamicTyping: true, skipEmptyLines: true, complete: (results) => { rawDiffData = results.data; }});
            Papa.parse(resAll, { header: true, skipEmptyLines: true, complete: (results) => { allCondoData = results.data; initDashboard(); }});
        }

        function initDashboard() {
            populateFilters();
            initMap();
            onFilterChange();
        }

        function populateFilters() {
            const pSelect = document.getElementById('filterProvince');
            [...new Set(rawDiffData.map(d => d.CHANGWAT_Name))].sort().forEach(p => pSelect.appendChild(new Option(p, p)));
        }

        function onProvinceChange() {
            const pVal = document.getElementById('filterProvince').value;
            const bSelect = document.getElementById('filterBranch');
            bSelect.innerHTML = '<option value="">-- ทั้งหมด --</option>';
            [...new Set(rawDiffData.filter(d => !pVal || d.CHANGWAT_Name === pVal).map(d => d.BRANCH_Name))].sort().forEach(b => bSelect.appendChild(new Option(b, b)));
            onFilterChange();
        }

        function onFilterChange() {
            updateKPIs();
            renderTop10();
        }

        function updateKPIs() {
            const filtered = rawDiffData.filter(d => 
                (!document.getElementById('filterProvince').value || d.CHANGWAT_Name === document.getElementById('filterProvince').value) &&
                (!document.getElementById('filterStatus').value || d.STATUS === document.getElementById('filterStatus').value)
            );
            document.getElementById('statTotalCondo').textContent = allCondoData.length.toLocaleString();
            document.getElementById('statTotalReg').textContent = filtered.reduce((a, b) => a + (b.ALL_REG || 0), 0).toLocaleString();
            document.getElementById('statTotalRoom').textContent = filtered.reduce((a, b) => a + (b.ALL_ROOM || 0), 0).toLocaleString();
        }

        function renderTop10() {
            const body = document.getElementById('top10TableBody');
            body.innerHTML = rawDiffData.filter(d => d.STATUS === "ร้อยละ 30 ขึ้นไป").sort((a,b) => b.Percent_Diff - a.Percent_Diff).slice(0, 10).map(d => 
                `<tr><td>${d.CONDO_NAME}</td><td>${d.STATUS}</td><td>${d.Percent_Diff}%</td></tr>`
            ).join('');
        }

        function initMap() {
            map = L.map('map').setView([13.0, 101.5], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' }).addTo(map);
        }

        window.onload = loadData;
    </script>
</body>
</html>
